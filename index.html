  <script>
    function showErr(msg) {
      var el = document.getElementById('err');
      if(!el) { document.addEventListener('DOMContentLoaded', function(){ showErr(msg); }); return; }
      el.style.display = 'block';
      el.textContent = (el.textContent ? el.textContent + '\n---\n' : '') + msg;
    }
    window.addEventListener('error', function(ev) {
      if(ev.target && (ev.target.tagName === 'SCRIPT' || ev.target.tagName === 'LINK')) {
        showErr('RESOURCE LOAD FAILED: ' + (ev.target.src || ev.target.href)); return;
      }
      showErr('JS ERROR: ' + ev.message + '\nLine: ' + ev.lineno + ':' + ev.colno + (ev.error ? '\n' + ev.error.stack : ''));
    }, true);
    window.addEventListener('unhandledrejection', function(ev) {
      showErr('PROMISE: ' + (ev.reason ? (ev.reason.stack || ev.reason.message || String(ev.reason)) : 'unknown'));
    });
  </script>

const ReportTab = ({records,assets}) => {
  const [activeReport,setActiveReport] = useState("combined");
  const today       = records.filter(r=>r.date===todayISO());
  const visitors    = today.filter(r=>r.type==="visitor");
  const contractors = today.filter(r=>r.type==="contractor");
  const staffRec    = today.filter(r=>r.type==="staff");
  const stillOnSite = today.filter(r=>r.status==="on-site");
  const assetsOut   = assets.filter(a=>a.status==="out");

  // All unique programs that had visitors today
  const activePrograms = [...new Set(visitors.map(v=>v.program))];

  const buildCombinedReport = () => {
    const lines=[];
    lines.push(`NWQICSS — Combined Daily Site Report`);
    lines.push(`Date: ${dateStr()}   Generated: ${nowStr()}`);
    lines.push(`Sent to: ${CEO_EMAIL}, ${HR_EMAIL}, ${WHS_EMAIL}`);
    lines.push(`${"-".repeat(50)}`);
    lines.push(``);
    // by location
    ALL_LOCATIONS.forEach(loc=>{
      const locVisitors = visitors.filter(r=>r.location===loc);
      const locStaff    = staffRec.filter(r=>r.location===loc);
      const locContractors = contractors.filter(r=>r.location===loc);
      if(locVisitors.length+locStaff.length+locContractors.length===0) return;
      lines.push(`📍 ${loc.toUpperCase()}`);
      lines.push(`--------------------`);
      if(locVisitors.length>0){
        lines.push(`  Visitors (${locVisitors.length}):`);
        locVisitors.forEach(r=>lines.push(`    • ${r.name} | ${r.program} | ${r.visit_purpose||r.purpose} | In: ${r.sign_in_time} Out: ${r.sign_out_time||"Still on site"}${r.has_children&&r.children_names?` | Children: ${r.children_names}`:r.has_children?" | Children accompanying":""}`));
      }
      if(locStaff.length>0){
        lines.push(`  Staff (${locStaff.length}):`);
        locStaff.forEach(r=>lines.push(`    • ${r.staff_name} | ${r.staff_status==="outreach"?"Outreach":"In Centre"} | In: ${r.sign_in_time} Out: ${r.sign_out_time||"Still on site"}${r.outreach_purpose?` | ${r.outreach_purpose}`:""}`));
      }
      if(locContractors.length>0){
        lines.push(`  Contractors (${locContractors.length}):`);
        locContractors.forEach(r=>lines.push(`    • ${r.company} | ${r.contact_name} | Compliance: ${r.compliance||"?"} | In: ${r.sign_in_time}`));
      }
      lines.push(``);
    });
    if(assetsOut.length>0){
      lines.push(`ASSETS STILL OUT:`);
      assetsOut.forEach(a=>lines.push(`  • ${a.name} — with ${a.assigned_to} since ${a.checked_out}`));
      lines.push(``);
    }
    if(stillOnSite.length>0){
      lines.push(`⚠️  STILL ON SITE (${stillOnSite.length}):`);
      stillOnSite.forEach(r=>lines.push(`  • ${r.name||r.company||r.staff_name} (${r.type}) in since ${r.sign_in_time}`));
    } else {
      lines.push(`✓  All persons signed out.`);
    }
    return lines.join("\n");
  };

  const buildProgramReport = (prog) => {
    const progVisitors = visitors.filter(r=>r.program===prog);
    const recipient    = PROGRAM_EMAILS[prog];
    const lines=[];
    lines.push(`NWQICSS — Daily Program Report: ${prog}`);
    lines.push(`Date: ${dateStr()}   Generated: ${nowStr()}`);
    lines.push(`Sent to: ${(recipient&&recipient.manager)||"—"}, ${HR_EMAIL}, ${WHS_EMAIL}`);
    lines.push(`${"-".repeat(50)}`);
    lines.push(`Total visitors today: ${progVisitors.length}`);
    lines.push(``);
    if(progVisitors.length===0){
      lines.push(`No visitors recorded for ${prog} today.`);
    } else {
      progVisitors.forEach((r,i)=>{
        lines.push(`${i+1}. ${r.name}`);
        lines.push(`   Purpose: ${r.visit_purpose||"—"}`);
        if(r.purpose) lines.push(`   Notes: ${r.purpose}`);
        lines.push(`   Location: ${r.location}`);
        lines.push(`   Sign In: ${r.sign_in_time}   Sign Out: ${r.sign_out_time||"Still on site"}`);
        if(r.phone) lines.push(`   Phone: ${r.phone}`);
        if(r.has_children&&r.children_names) lines.push(`   Children: ${r.children_names}`);
        else if(r.has_children) lines.push(`   Children: Accompanying (names not recorded)`);
        lines.push(``);
      });
    }
    return lines.join("\n");
  };

  const emailCombined = () => {
    const subject = encodeURIComponent(`NWQICSS Combined Daily Report — ${dateStr()}`);
    const body    = encodeURIComponent(buildCombinedReport());
    window.open(`mailto:${CEO_EMAIL},${HR_EMAIL},${WHS_EMAIL}?subject=${subject}&body=${body}`);
  };

  const emailProgram = (prog) => {
    const recipient = PROGRAM_EMAILS[prog];
    if(!recipient) return;
    const subject = encodeURIComponent(`NWQICSS Daily Report: ${prog} — ${dateStr()}`);
    const body    = encodeURIComponent(buildProgramReport(prog));
    const to      = [recipient.manager,HR_EMAIL,WHS_EMAIL].join(",");
    window.open(`mailto:${to}?subject=${subject}&body=${body}`);
  };

  const exportCSV = () => {
    const rows=[["Type","Name","Program","Purpose","Notes","Location","Sign In","Sign Out","Status"],
      ...today.map(r=>[r.type,r.name||r.company||r.staff_name,r.program||"",r.visit_purpose||"",r.purpose||r.outreach_purpose||"",r.location,r.sign_in_time,r.sign_out_time||"On Site",r.status])];
    const a=document.createElement("a");
    a.href="data:text/csv;charset=utf-8,"+encodeURI(rows.map(r=>r.map(c=>`"${c||""}"`).join(",")).join("\n"));
    a.download=`NWQICSS_Report_${todayISO()}.csv`;a.click();
  };

  const reportText = activeReport==="combined" ? buildCombinedReport() : buildProgramReport(activeReport);

        , [

          {icon:"🔧",val:contractors.length,label:"Contractors",color:T.accent2},
          {icon:"👷",val:staffRec.length,label:"Staff",color:T.amber},
          {icon:"⚠️",val:stillOnSite.length,label:"Still On Site",color:stillOnSite.length>0?T.red:T.green},
          {icon:"🚗",val:assetsOut.length,label:"Assets Out",color:assetsOut.length>0?T.red:T.green},
        ].map(({icon,val,label,color})=>(
          React.createElement(Card, { key: label, style: {flex:1,minWidth:90,textAlign:"center"},}
            , React.createElement('div', { style: {fontSize:20,marginBottom:4},}, icon)
            , React.createElement('div', { style: {fontSize:26,fontWeight:900,color,lineHeight:1},}, val)

        , React.createElement('div', { style: {display:"flex",gap:8,flexWrap:"wrap"},}
          , React.createElement('button', { onClick: ()=>setActiveReport("combined"), style: {padding:"6px 14px",borderRadius:20,fontSize:12,fontWeight:700,cursor:"pointer",
            background:activeReport==="combined"?CEO_EMAIL?T.accent:T.accent:T.accent,color:T.bg,border:`1px solid ${T.accent}`,opacity:activeReport==="combined"?1:.5},}, "📋 Combined Report"

const dbFetch = async () => {
  try {
    const tISO = new Date().toLocaleDateString("en-CA",{timeZone:"Australia/Brisbane"});
    const y = new Date(); y.setDate(y.getDate()-1);
    const yISO = y.toLocaleDateString("en-CA",{timeZone:"Australia/Brisbane"});
    const r = await fetch(
      SUPABASE_URL+"/rest/v1/records?or=(date.eq."+tISO+",date.eq."+yISO+")&order=id.desc&limit=2000",
      {headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Cache-Control":"no-cache"}}
    );
    if(r.ok) return await r.json();
  } catch(e){}
  return null;
};

const dbInsert = async (record) => {
  // Retry up to 3 times with backoff
  for(let attempt=0; attempt<3; attempt++){
    try {
      const r = await fetch(SUPABASE_URL+"/rest/v1/records",{
        method:"POST",
        headers:{
          "apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,
          "Content-Type":"application/json","Prefer":"return=representation"
        },
        body:JSON.stringify(record)
      });
      if(r.ok) return true;
    } catch(e){}
    // Wait before retry: 500ms, 1500ms
    await new Promise(res=>setTimeout(res, 500 * (attempt+1)));
  }
  return false;
};

const dbUpdate = async (id, patch) => {
  for(let attempt=0; attempt<3; attempt++){
    try {
      const r = await fetch(SUPABASE_URL+"/rest/v1/records?id=eq."+id,{
        method:"PATCH",
        headers:{
          "apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,
          "Content-Type":"application/json"
        },
        body:JSON.stringify(patch)
      });
      if(r.ok) return true;
    } catch(e){}
    await new Promise(res=>setTimeout(res, 500 * (attempt+1)));
  }
  return false;
};

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {error:null}; }
  static getDerivedStateFromError(e) { return {error:e}; }
  componentDidCatch(e,info) { console.error("React Error:",e,info); }
  render() {
    if(this.state.error) {
      return React.createElement('div',{style:{background:"#c0392b",color:"#fff",padding:24,fontFamily:"monospace",fontSize:13,whiteSpace:"pre-wrap"}},
        "APP CRASH: "+this.state.error.message+"\n\n"+this.state.error.stack
      );
    }
    return this.props.children;
  }
}

function App() {
  const [tab,setTab]         = useState("dashboard");
  const [dbReady,setDbReady] = useState(false);
  const [location,setLoc]    = useState("Mount Isa");
  const [records,setRecs]    = useState([]);
  const [assets,setAssets]   = useState(DEFAULT_ASSETS);
  const [staffList,setStaff] = useState(DEFAULT_STAFF);
  const [modal,setModal]     = useState(null);
  const [time,setTime]       = useState(nowStr());

  useEffect(()=>{const t=setInterval(()=>setTime(nowStr()),30000);return()=>clearInterval(t);},[]);

  const handleSignIn = form => {
    const newRec = {
      id:genId(), type:modal,
      sign_in_time:nowStr(), sign_out_time:null, status:"on-site",
      location:form.loc||location, date:todayISO(),
      ...(modal==="visitor"&&{
        name:form.name, purpose:form.purpose, visit_purpose:form.visit_purpose,
        program:form.program, phone:form.phone,
        has_children:form.has_children||false,
        children_names:form.has_children&&form.children?(form.children.filter(n=>n.trim()).join(", ")):""
      }),
      ...(modal==="contractor"&&{
        company:form.company, contact_name:form.contact, program:form.program||"",
        purpose:form.purpose, phone:form.phone, compliance:"valid",
        has_insurance:form.has_insurance||false,
        has_code_of_conduct:form.has_code_of_conduct||false,
        has_safety_forms:form.has_safety_forms||false
      }),
      ...(modal==="staff"&&{
        staff_name:form.staff, staff_status:form.staff_mode,
        outreach_purpose:form.outreach_purpose||"",
        outreach_notes:form.outreach_notes||"",
        has_duress:form.has_duress||false, duress_number:form.duress_number||"",
        has_vehicle:form.has_vehicle||false, vehicle_rego:form.vehicle_rego||""
      }),
    };
    setRecs(p=>[...p, newRec]);
    setModal(null);
    insertRecord(newRec);
  };

  // -- Live sync from Supabase (3-second polling) --------------------
  // pendingIds = set of IDs inserted locally but not yet confirmed in DB
  const pendingRef = React.useRef(new Set());

  useEffect(()=>{
    const load = async () => {
      const data = await dbFetch();
      if(data && Array.isArray(data)){
        const dbIds = new Set(data.map(r=>String(r.id)));
        // Remove from pending any that are now in DB
        pendingRef.current.forEach(id=>{ if(dbIds.has(String(id))) pendingRef.current.delete(id); });
        // Merge: DB is truth, but keep local-pending records not yet in DB
        setRecs(prev => {
          const stillPending = prev.filter(r=>pendingRef.current.has(r.id));
          return [...data, ...stillPending];
        });
        setDbReady(true);
      } else {
        setDbReady(false);
      }
    };
    load();
    const iv = setInterval(load, 3000);
    return () => clearInterval(iv);
  },[]);

  // Insert a record, track it as pending until confirmed in DB
  const insertRecord = async (rec) => {
    pendingRef.current.add(rec.id);
    const ok = await dbInsert(rec);
    if(!ok){
      // Keep in pending longer — will retry on next sync cycle
      console.warn("Insert failed for id", rec.id);
    }
  };

  const handleSignOut = id => {
    const patch = {sign_out_time:nowStr(),status:"signed-out"};
    setRecs(p=>p.map(r=>r.id===id?{...r,...patch}:r));
    dbUpdate(id, patch).then(ok=>{
      if(!ok) console.warn("Sign-out update failed for id", id);
    });
  };

  const handleAsset = (id,action) => {
    if(action==="return"){
      setAssets(p=>p.map(a=>a.id===id?{...a,status:"available",assigned_to:null,checked_out:null}:a));
    } else {
      const who=prompt("Who is checking out this asset?");
      if(who) setAssets(p=>p.map(a=>a.id===id?{...a,status:"out",assigned_to:who,checked_out:nowStr()}:a));
    }
  };

  const onSiteCount = records

    {id:"admin",       icon:"⚙️",  label:"Admin"},
  ];

    React.createElement(ErrorBoundary, null
    , React.createElement('div', { style: {minHeight:"100vh",background:T.bg,color:T.text,fontFamily:"'Segoe UI',system-ui,sans-serif",fontSize:14},}

      /* Header */
      , React.createElement('div', { style: {background:T.surface,borderBottom:`1px solid ${T.border}`,padding:"0 16px",position:"sticky",top:0,zIndex:100},}
        , React.createElement('div', { style: {maxWidth:1100,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:52},}
          , React.createElement('div', { style: {display:"flex",alignItems:"center",gap:10},}
            , React.createElement('div', { style: {width:32,height:32,borderRadius:8,background:T.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:900,color:T.bg},}, "N")
            , React.createElement('div', null
              , React.createElement('div', { style: {fontSize:13,fontWeight:900,color:T.white,lineHeight:1.1},}, "NWQICSS")
              , React.createElement('div', { style: {fontSize:9,color:T.muted,letterSpacing:.6,textTransform:"uppercase"},}, "Compliance Portal" )

      /* Location selector */

      )

      /* Tab bar */
      , React.createElement('div', { style: {background:T.surface,borderBottom:`1px solid ${T.border}`,padding:"0 16px",overflowX:"auto",WebkitOverflowScrolling:"touch"},}
        , React.createElement('div', { style: {maxWidth:1100,margin:"0 auto",display:"flex",gap:0},}
          , TABS.map(t=>(
            React.createElement('button', { key: t.id, onClick: ()=>setTab(t.id), style: {
              padding:"11px 12px",background:"transparent",border:"none",
              borderBottom:`2px solid ${tab===t.id?T.accent:"transparent"}`,
              color:tab===t.id?T.accent:T.muted,fontWeight:700,fontSize:12,
              cursor:"pointer",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:4,
              WebkitTapHighlightColor:"transparent"},}
              , t.icon, " " , t.label
              , t.id==="emergency"&&onSiteCount>0&&(
                React.createElement('span', { style: {background:T.red,color:"#fff",borderRadius:20,fontSize:10,fontWeight:900,padding:"1px 6px"},}, onSiteCount)
              )
            )
          ))
        )
      )

      /* Page content */
      , React.createElement('div', { style: {maxWidth:1100,margin:"0 auto",padding:"20px 16px"},}
        , tab==="dashboard"   &&React.createElement(Dashboard, { records: records, assets: assets, location: location,})
        , tab==="kiosk"&&(
          React.createElement('div', null
            , React.createElement('div', { style: {fontSize:11,color:T.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:4},}, "Sign In Kiosk"  )
            , React.createElement('div', { style: {fontSize:22,fontWeight:900,color:T.white,marginBottom:4},}, "Who's signing in today?"   )

                )
              ))
            )

          )

        , tab==="visitors"    &&React.createElement(VisitorsTab, { records: records, onSignOut: handleSignOut, location: location,})
        , tab==="contractors" &&React.createElement(ContractorsTab, { records: records, onSignOut: handleSignOut, location: location,})

        , tab==="duress"      &&React.createElement(DuressTab, { assets: assets, setAssets: setAssets, staffList: staffList, location: location,})

        , tab==="report"      &&React.createElement(ReportTab, { records: records, assets: assets,})

      )

      , modal&&React.createElement(SignInModal, { type: modal, location: location, staffList: staffList, onClose: ()=>setModal(null), onSubmit: handleSignIn,})
    )
    )
  );
}
